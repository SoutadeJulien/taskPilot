name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install setuptools "pyinstaller>=6.11" -r requirements.txt

      - name: Build TaskPilot.exe
        run: python -m PyInstaller --noconfirm taskpilot.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskPilot
          path: dist/TaskPilot.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: TaskPilot v1.0.${{ github.run_number }}
          body: |
            Build automatique depuis `${{ github.sha }}`.

            Téléchargez `TaskPilot.exe` ci-dessous (autonome, aucune installation requise).
          files: dist/TaskPilot.exe
