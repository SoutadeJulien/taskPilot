[flake8]
# Longueur de ligne alignee sur la convention moderne (Black ~ 88-99)
# plutot que le 79 strict de PEP 8, plus confortable pour le code GUI.
max-line-length = 99
extend-ignore =
    # E203 : faux positifs sur le slicing, incompatible avec Black
    E203
exclude =
    .git,
    __pycache__,
    build,
    dist
